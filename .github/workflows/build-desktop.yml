name: Build Nuru Analytics Premium Desktop App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Frontend Dependencies
      run: |
        npm install --legacy-peer-deps
      shell: bash

    - name: Build Frontend (Vite)
      run: npm run build

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Compile Desktop App with PyInstaller
      run: |
        pyinstaller --clean --onefile --noconsole --name "Nuru_Analytics_Premium" --add-data "dist;dist" main.py
      shell: cmd

    - name: Upload Installer Executable
      uses: actions/upload-artifact@v4
      with:
        name: Nuru_Analytics_Windows_x64
        path: dist/Nuru_Analytics_Premium.exe
        retention-days: 7

  build-linux:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install System Dependencies for Pywebview on Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential python3-dev \
          libgirepository1.0-dev libcairo2-dev pkg-config python3-gi \
          python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Frontend Dependencies
      run: |
        npm install --legacy-peer-deps
      shell: bash

    - name: Build Frontend (Vite)
      run: npm run build

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compile Desktop App with PyInstaller
      run: |
        pyinstaller --clean --onefile --noconsole --name "Nuru_Analytics_Premium_Linux" --add-data "dist:dist" main.py
      shell: bash

    - name: Upload Installer Executable
      uses: actions/upload-artifact@v4
      with:
        name: Nuru_Analytics_Linux_x64
        path: dist/Nuru_Analytics_Premium_Linux
        retention-days: 7

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    permissions:
      contents: write
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Nuru_Analytics_Windows_x64
          path: release-artifacts

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: Nuru_Analytics_Linux_x64
          path: release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "Release v1.0.${{ github.run_number }}"
          files: |
            release-artifacts/Nuru_Analytics_Premium.exe
            release-artifacts/Nuru_Analytics_Premium_Linux
          draft: false
          prerelease: false
          generate_release_notes: true
